<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dom practice</title>
    <link
      rel="stylesheet"
      href="style.css
    "
    />
  </head>
  <body>
    <h1>HTML buttons</h1>
    <p class="demo">
      this is paragraph
      <span style="display: none">World</span>
    </p>
    <p class="demo">this is second para</p>

    <input type="text" value="mehatab" id="username" />

    <div data-role="admin"></div>

    <button class="darkmode">toggle</button>

    <div class="box">sd</div>

    <button onclick="document.querySelector('.box').innerHTML = Date()">
      click!!
    </button>

    <div class="datee">d</div>
    <button class="dateee">date</button>

    <p class="hi">a</p>
    <button class="add">Add</button>
    <button class="remove">Remove</button>

    <div class="parent">
      <button class="child">Bubbling</button>
    </div>

    <form id="form">
      <input type="text" placeholder="Enter your name" id="namee" />
      <button type="submit">submit</button>
    </form>

    <button class="evtobj">Event Object</button>

    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>

    <form id="loginform">
      <input type="text" id="username" placeholder="Enter your username" />
      <input type="text" id="password" placeholder="Enter your password" />
      <button type="submit">Login</button>
    </form>

    <form id="signupForm">
      <input type="text" name="name" placeholder="Enter your name"/>
      <input type="text" name="email" placeholder="Enter your email"/>
      <input type="text" name="password" placeholder="Enter your password"/>
      <button type="submit">Signup</button>
    </form>

    <form id="loginpage">
      <input type="text" placeholder="Enter your username" name="username">
      <input type="text" placeholder="Enter your password" name="password">
      <button type="submit">Login</button>
    </form>
  </body>
  <script src="script.js"></script>
</html>
